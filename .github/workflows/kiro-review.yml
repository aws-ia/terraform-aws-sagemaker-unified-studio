name: Kiro PR Review

on:
  pull_request:
    branches: [dev-test] # change to [dev] after testing

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} > pr-diff.txt

      - name: Run Kiro review
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: |
          kiro-cli chat --no-interactive --trust-tools=read,grep \
            "Read the file pr-diff.txt in the current directory. It contains the full git diff for this PR.
            You are a senior Terraform code reviewer for an AWS infrastructure module.

            After analyzing the diff, output ONLY the final review in this EXACT GitHub markdown format (no tool logs, no thinking, just the final markdown):

            ## Walkthrough
            One short paragraph summarizing what the PR does.

            ## Changes

            | File | Summary |
            |------|---------|
            | \`path/to/file\` | Brief description |

            <details>
            <summary>🔍 Findings (N issues: X critical, Y warnings, Z suggestions)</summary>

            ### Security
            - 🔴/🟡/🟢 Finding in \`file\`: description

            ### Breaking Changes
            - 🔴/🟡/🟢 Finding description

            ### Module Conventions
            - 🔴/🟡/🟢 Finding description

            ### Terraform Anti-Patterns
            - 🔴/🟡/🟢 Finding description

            </details>

            Rules:
            - Output ONLY the markdown review. No preamble, no explanation of your process.
            - Be succinct. One line per finding max.
            - Use backticks for file/variable references.
            - If a section has no findings, write 'No issues found.'
            - If the changes look good overall, say so in the Walkthrough." \
            > /tmp/review-output.txt

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Strip ANSI codes and Kiro tool-use logs
          sed 's/\x1b\[[0-9;]*m//g' /tmp/review-output.txt \
            | sed '/^Reading file:/d' \
            | sed '/^Batch fs_read/d' \
            | sed '/^↱ Operation/d' \
            | sed '/^ ✓ /d' \
            | sed '/^ ⋮/d' \
            | sed '/^- Summary:/d' \
            | sed '/^ - Completed/d' \
            | sed '/^Searching:/d' \
            | sed '/^Getting symbols/d' \
            | sed '/^Failed to get/d' \
            | sed '/^> /d' \
            | sed '/^━/d' \
            | sed '/^\[?25/d' \
            | sed '/^$/N;/^\n$/d' \
            > /tmp/review-clean.txt
          {
            echo "## 🤖 Kiro AI Review"
            echo ""
            cat /tmp/review-clean.txt
            echo ""
            echo "---"
            echo "*Automated review by [Kiro CLI](https://kiro.dev) in headless mode*"
          } > /tmp/comment-body.txt
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/comment-body.txt
