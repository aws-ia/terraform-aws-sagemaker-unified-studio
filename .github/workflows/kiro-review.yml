name: Kiro PR Review

on:
  pull_request:
    branches: [dev-test] # change to [dev] after testing

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    # Skip fork PRs — secrets are unavailable and we must not expose them
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Kiro CLI
        run: curl -fsSL https://cli.kiro.dev/install | bash

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} > pr-diff.txt

      - name: Build prompt
        run: |
          CONFIG=""
          if [ -f .kiro-review.yml ]; then
            CONFIG=$(cat .kiro-review.yml)
          fi
          cat > /tmp/prompt.txt << 'PROMPT_END'
          You are a production-grade Terraform PR review agent.

          INSTRUCTIONS:
          1. Read the file pr-diff.txt — it contains the full git diff for this PR.
          2. If a file .kiro-review.yml exists in the current directory, read it for review configuration (ignore patterns, severity threshold, custom instructions).
          3. Apply the ignore patterns from the config — skip files matching those globs.
          4. Only report findings at or above the severity_threshold in the config.
          5. Focus on the checks enabled in the config.
          6. Follow any custom instructions from the config.

          OUTPUT FORMAT (output ONLY this markdown, nothing else):

          ## Walkthrough
          One short paragraph summarizing what the PR does.

          ## Changes

          | File | Summary |
          |------|---------|
          | `path/to/file` | Brief description |

          <details>
          <summary>🔍 Findings (N issues: X critical, Y warnings, Z suggestions)</summary>

          ### Security
          - 🔴/🟡/🟢 `file`: description

          ### Breaking Changes
          - 🔴/🟡/🟢 description

          ### Module Conventions
          - 🔴/🟡/🟢 description

          ### Terraform Anti-Patterns
          - 🔴/🟡/🟢 description

          </details>

          Rules:
          - Output ONLY the markdown. No tool logs, no preamble.
          - One line per finding max. Be succinct.
          - Use backticks for ALL code references including version constraints, provider names, file paths, variable names, and resource types.
          - If a section has no findings, write 'No issues found.'
          - If changes look good, say so in the Walkthrough.
          PROMPT_END

      - name: Run Kiro review
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: |
          PROMPT=$(cat /tmp/prompt.txt)
          kiro-cli chat --no-interactive --trust-tools=read,grep "$PROMPT" > /tmp/review-output.txt

      - name: Submit review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Strip ANSI codes and tool-use logs
          sed 's/\x1b\[[0-9;]*m//g' /tmp/review-output.txt \
            | sed 's/\x1b\[?25[hl]//g' \
            | sed '/^Reading file:/d' \
            | sed '/^Batch fs_read/d' \
            | sed '/^↱ Operation/d' \
            | sed '/^ ✓ /d' \
            | sed '/^ ⋮/d' \
            | sed '/^- Summary:/d' \
            | sed '/^ - Completed/d' \
            | sed '/^Searching:/d' \
            | sed '/^Getting symbols/d' \
            | sed '/^Failed to get/d' \
            | sed '/^> /d' \
            | sed '/^━/d' \
            | sed '/^Let me /d' \
            | sed '/^$/N;/^\n$/d' \
            > /tmp/review-clean.txt

          REVIEW_BODY=$(cat <<'EOF'
          ## 🤖 Kiro AI Review

          EOF
          )
          REVIEW_BODY="${REVIEW_BODY}
          $(cat /tmp/review-clean.txt)

          ---
          _Automated review by [Kiro CLI](https://kiro.dev) in headless mode_"

          # Submit as a PR review (COMMENT event — never approves or requests changes)
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews \
            --method POST \
            --field body="$REVIEW_BODY" \
            --field event="COMMENT"
