download-external-modules: False
evaluate-variables: true
directory:
- ./
framework:
- terraform
skip-check:
- CKV2_GCP*
- CKV_AZURE*
- CKV2_AZURE*
- CKV_TF_1 # default to Terraform registry instead of Git
- CKV_AWS_18 # S3 access logging intentionally disabled; self-logging into the same bucket causes recursive logging and isn't a supported service standard
summary-position: bottom
output: 'cli'
compact: True
quiet: True